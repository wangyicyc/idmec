opt_args:
  # ---------- 搜索空间与离散化 ----------
  workspace: 4.0          # 搜索区域边长 (m)，工作空间为 [0, workspace] × [0, workspace]
  dt: 0.05                # 规划时间步长 (s)
  tsteps: 240             # 总规划步数，总规划时间 = dt × tsteps

  # ---------- iLQR 优化权重 ----------
  R: [0.010, 0.010]      # 控制输入正则化权重 (对角阵 diag(R))
  Q_z: [0.0001, 0.0001, 0.001, 0.001]  # 状态代价权重 [px, py, vx, vy]
  R_v: [0.005, 0.005]     # 终端速度正则化权重

  # ---------- 控制与速度约束 ----------
  U_max: [0.8, 0.8]       # 控制输入上限 (m/s²) [ux, uy]
  U_min: [-0.8, -0.8]     # 控制输入下限 (m/s²) [ux, uy]
  V_max: [0.8, 0.8]       # 速度上限 (m/s) [vx, vy]
  V_min: [-0.8, -0.8]     # 速度下限 (m/s) [vx, vy]

  # ---------- 机器人初始/终点位置 ----------
  # 格式: [x0_0, y0_0, x0_1, y0_1, ...], 按机器人编号顺序排列
  x0: [0.8, 0.5, 1.63, 0.5, 2.42, 0.5, 3.2, 0.5]     # 四机器人起点 (4×4 地图)
  xf: [1.0, 3.2, 1.6, 3.2, 2.4, 3.2, 3.0, 3.2]        # 四机器人终点 (4×4 地图)
  # x0: [0.7, 0.5, 1.3, 0.5, 1.8, 0.5, 2.3, 0.5]      # 四机器人起点 (3×3 地图)
  # xf: [0.7, 2.2, 1.3, 2.2, 1.8, 2.2, 2.3, 2.2]      # 四机器人终点 (3×3 地图)
  # x0: [1.0, 1.2, 2.0, 1.0, 3.0, 1.2, 4.0, 1.0]      # 四机器人起点 (5×5 地图)
  # xf: [2.0, 4.0, 1.0, 3.8, 4.0, 4.0, 3.0, 3.8]      # 四机器人终点 (5×5 地图)
  # x0: [0.8, 4.2, 3.0, 5.0, 3.1, 0.7,  0.5, 1.0]     # 四机器人起点 (6×6 地图)
  # xf: [4.0, 2.0, 1.3, 1.5, 3.1, 4.5, 5.0, 3.5]      # 四机器人终点 (6×6 地图)

  # ---------- 安全与通信 ----------
  avoidance_radius: 0.35   # 避障安全半径 (m)，机器人间距不得小于此值
  com_radius: 0.6          # 通信半径 (m)，用于计算信息融合权重
  connect_threshold: 0.6   # 判定机器人相遇/可交换信息的距离阈值 (m)
  robot_pair:              # 所有机器人对组合 (用于通信消息交换)
  - [0, 1]
  - [0, 2]
  - [0, 3]
  - [1, 2]
  - [1, 3]
  - [2, 3]

  # ---------- 优化目标权重 ----------
  weight_erg: 1.0           # ergodic metric 权重
  weight_barrierCost: 1.0   # 边界屏障函数权重
  weight_probability: 0.1   # 概率密度权重 (贝叶斯地图更新)
  weight_avoidance: 0.10    # 避障代价权重
  minimum_probability: 0.00085  # 地图概率下限, 防止零概率区域

  # ---------- 地图更新与融合 ----------
  update_map_freq: 60       # 目标地图更新周期 (步数)，每 N 步更新一次全局目标分布
  map_merge_freq: 10        # 机器人地图融合周期 (步数)，通信时融合彼此的概率地图
  period_num: 3             # 目标分布变化的总阶段数

  # ---------- 输出配置 ----------
  output_mode: both         # 输出模式: none (不输出) | bag (写入 bag 文件) | topic (发布 ROS2 话题) | both (同时)
  output_bag_dir: ./datas/bags/my_strategy  # bag 文件输出目录 (相对于 multi_ergodic_search 包根目录)
  output_topic: /trajectory/robot_{robot_id}/control_sequence  # 话题模板, {robot_id} 会被替换为 0,1,2,3
  output_publish_rate: 20.0 # 话题发布频率 (Hz)
  enable_plot: false        # 是否在运行结束后绘制轨迹图

  # ---------- 机器人数量 ----------
  robot_number: 4

# ---------- 目标分布定义 ----------
# means: 高斯中心点列表，每个点对应一个搜索目标
# covs: 协方差矩阵列表，控制目标高斯分布的散布范围与方向
# 注释中预置了 3×3, 4×4, 5×5, 6×6 地图的配置，取消注释即可切换
mapinfo_point:
  # ---------- 4×4 地图 (当前启用) ----------
  means:
  - [1.0, 2.4]
  - [1.2, 1.4]
  - [2.9, 1.5]
  - [2.5, 2.9]
  covs:
  - [[0.08, 0.0], [0.00, 0.10]]
  - [[0.08, 0.0], [0.00, 0.10]]
  - [[0.08, 0.0], [0.00, 0.10]]
  - [[0.08, 0.0], [0.00, 0.10]]

